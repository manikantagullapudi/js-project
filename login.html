<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
     <div class="logo-box">
        <div class="logo">🛍️</div>
        <h1>PRODUCTS-Catalog</h1>
    </div>
    <br>
    <form action="">
        <label for="email">📧Email:</label><br>
        <input type="email" placeholder="Enter your email" id="email" autocomplete="off">
        <br><br>
        <label for="password">🔑Password:</label><br>
        <input type="password" placeholder="Enter your password" id="password" autocomplete="new-password">
        <br><br>
        <p id="msg"></p>
        <button type="submit" id="btn">LOGIN</button>
    </form>
    <p>Dont Have an Account? <a href="register.html">Register Here</a></p>
    
    <script src="login.js"></script>
</body>
</html>
