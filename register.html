<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="logo-box">
    <h1 class="logo">🛍️</h1>
    <p class="tag">PRODUCTS-Catalog</p>
    <p class="tag">Create your account</p>
    </div>

    <form action="">
        <label for="name">👤User Name:</label><br>
        <input type="text" placeholder="Enter your name" id="username" autocomplete="off">
        <br><br>
        <label for="email">📧Email:</label><br>
        <input type="email" placeholder="Enter your email" id="email" autocomplete="off">
        <br><br>
        <label for="password">🔑Password:</label><br>
        <input type="password" placeholder="Enter your password" id="password" autocomplete="new-password">
        <br><br>
        <p id="msg"></p>
        <button type="submit" id="btn">REGISTER</button>
    </form>
    <script src="register.js"></script>
</body>
</html>
